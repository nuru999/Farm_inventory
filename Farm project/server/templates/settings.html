{% extends "base.html" %}

{% block title %}Settings - FarmSys{% endblock %}
{% block page_title %}Settings{% endblock %}

{% block content %}
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <!-- General Settings -->
    <div class="content-card">
        <div class="card-header">⚙️ General Settings</div>
        <form class="form-grid">
            <div class="form-group">
                <label>Farm Name</label>
                <input type="text" value="My Farm">
            </div>
            <div class="form-group">
                <label>Currency</label>
                <select>
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="GBP">GBP (£)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Timezone</label>
                <select>
                    <option>UTC-5 (Eastern)</option>
                    <option>UTC+0 (GMT)</option>
                    <option>UTC+1 (Central Europe)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date Format</label>
                <select>
                    <option>MM/DD/YYYY</option>
                    <option>DD/MM/YYYY</option>
                    <option>YYYY-MM-DD</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Save Changes</button>
        </form>
    </div>

    <!-- Notifications -->
    <div class="content-card">
        <div class="card-header">🔔 Notifications</div>
        <form class="form-grid" style="grid-template-columns: 1fr;">
            <div class="form-group" style="flex-direction: row; align-items: center; justify-content: space-between;">
                <label>Low Stock Alerts</label>
                <input type="checkbox" checked style="width: 20px; height: 20px; accent-color: var(--accent-color);">
            </div>
            <div class="form-group" style="flex-direction: row; align-items: center; justify-content: space-between;">
                <label>Email Reports</label>
                <input type="checkbox" style="width: 20px; height: 20px; accent-color: var(--accent-color);">
            </div>
            <div class="form-group" style="flex-direction: row; align-items: center; justify-content: space-between;">
                <label>SMS Alerts</label>
                <input type="checkbox" style="width: 20px; height: 20px; accent-color: var(--accent-color);">
            </div>
            <div class="form-group" style="flex-direction: row; align-items: center; justify-content: space-between;">
                <label>Daily Summary</label>
                <input type="checkbox" checked style="width: 20px; height: 20px; accent-color: var(--accent-color);">
            </div>
            <button type="submit" class="btn-primary">Update Preferences</button>
        </form>
    </div>

    <!-- Account Settings -->
    <div class="content-card">
        <div class="card-header">👤 Account</div>
        <form class="form-grid">
            <div class="form-group">
                <label>Username</label>
                <input type="text" value="admin">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" value="admin@farmsys.com">
            </div>
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Update Account</button>
        </form>
    </div>

    <!-- Backup -->
    <div class="content-card">
        <div class="card-header">💾 Data Management</div>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="btn-primary" style="background-color: var(--bg-card); color: var(--text-primary);">
                📥 Export Data (CSV)
            </button>
            <button class="btn-primary" style="background-color: var(--bg-card); color: var(--text-primary);">
                📤 Import Data
            </button>
            <button class="btn-primary" style="background-color: #dc2626;">
                🗑️ Clear All Data
            </button>
        </div>
    </div>
</div>
{% endblock %}
