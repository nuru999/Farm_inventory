<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Inventory Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 dark:bg-slate-900 flex min-h-screen text-slate-800 dark:text-slate-100">

<!-- SIDEBAR -->
<aside class="w-64 bg-green-700 text-white min-h-screen p-6 space-y-6">
    <h1 class="text-2xl font-bold">🌱 FarmSys</h1>
    <nav class="space-y-3">
        <a href="#" class="block p-2 rounded hover:bg-green-600">📊 Dashboard</a>
        <a href="#" class="block p-2 rounded hover:bg-green-600">📦 Inventory</a>
        <a href="#" class="block p-2 rounded hover:bg-green-600">⚙ Settings</a>
    </nav>
</aside>

<!-- MAIN -->
<main class="flex-1 p-6 space-y-6">

    <!-- TOP BAR -->
    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-semibold">Dashboard</h2>
        <button onclick="toggleDark()" class="bg-slate-200 px-3 py-1 rounded">🌙</button>
    </div>

    <!-- STATS CARDS -->
    <div class="grid md:grid-cols-3 gap-4">
        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow">
            <p class="text-sm text-gray-500 dark:text-gray-400">Total Items</p>
            <h3 id="totalItems" class="text-2xl font-bold">0</h3>
        </div>
        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow">
            <p class="text-sm text-gray-500 dark:text-gray-400">Total Quantity</p>
            <h3 id="totalQty" class="text-2xl font-bold">0</h3>
        </div>
        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow">
            <p class="text-sm text-gray-500 dark:text-gray-400">Inventory Value</p>
            <h3 id="totalValue" class="text-2xl font-bold">$0</h3>
        </div>
    </div>

    <!-- ADD ITEM FORM -->
    <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow space-y-4">
        <h2 class="text-xl font-semibold">Add / Edit Item</h2>
        <div id="message" class="hidden p-2 rounded"></div>
        <form id="inventoryForm" class="grid md:grid-cols-2 gap-4">
            <div>
                <label for="Item" class="block mb-1 font-medium">Item Name</label>
                <input type="text" id="Item" class="w-full p-2 rounded border dark:bg-slate-700">
            </div>
            <div>
                <label for="Category" class="block mb-1 font-medium">Category</label>
                <input type="text" id="Category" class="w-full p-2 rounded border dark:bg-slate-700">
            </div>
            <div>
                <label for="Quantity" class="block mb-1 font-medium">Quantity</label>
                <input type="number" id="Quantity" class="w-full p-2 rounded border dark:bg-slate-700">
            </div>
            <div>
                <label for="Units_of_Measurement" class="block mb-1 font-medium">Units</label>
                <input type="text" id="Units_of_Measurement" class="w-full p-2 rounded border dark:bg-slate-700">
            </div>
            <div>
                <label for="Unit_Cost" class="block mb-1 font-medium">Unit Cost</label>
                <input type="number" id="Unit_Cost" class="w-full p-2 rounded border dark:bg-slate-700">
            </div>
            <div>
                <label for="Supplier" class="block mb-1 font-medium">Supplier</label>
                <input type="text" id="Supplier" class="w-full p-2 rounded border dark:bg-slate-700">
            </div>
            <div>
                <label for="Purchase_Date" class="block mb-1 font-medium">Purchase Date</label>
                <input type="date" id="Purchase_Date" class="w-full p-2 rounded border dark:bg-slate-700">
            </div>
            <div>
                <label for="Expiry_Date" class="block mb-1 font-medium">Expiry Date</label>
                <input type="date" id="Expiry_Date" class="w-full p-2 rounded border dark:bg-slate-700">
            </div>
            <button type="submit" class="md:col-span-2 bg-green-600 hover:bg-green-500 text-white font-semibold p-3 rounded">Add / Update Inventory</button>
        </form>
    </div>

    <!-- SEARCH -->
    <input type="text" id="searchInput" placeholder="🔍 Search items..." class="w-full p-3 rounded-lg border dark:bg-slate-700">

    <!-- INVENTORY TABLE -->
    <div class="overflow-x-auto">
        <table class="w-full bg-white dark:bg-slate-800 rounded-xl shadow">
            <thead>
                <tr class="bg-green-600 text-white">
                    <th class="p-3">Item</th>
                    <th class="p-3">Category</th>
                    <th class="p-3">Quantity</th>
                    <th class="p-3">Units</th>
                    <th class="p-3">Unit Cost</th>
                    <th class="p-3">Supplier</th>
                    <th class="p-3">Purchase Date</th>
                    <th class="p-3">Expiry Date</th>
                    <th class="p-3">Actions</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                <!-- Rows loaded dynamically -->
            </tbody>
        </table>
    </div>

</main>

<script>
let originalSubmit = null;
let inventoryData = [];

function toggleDark() {
    document.body.classList.toggle("dark");
}

// LOAD INVENTORY
async function loadInventory() {
    try {
        const res = await fetch("/api/inventory");
        const data = await res.json();
        inventoryData = data;

        // Update stats
        let totalItems = data.length;
        let totalQty = 0;
        let totalValue = 0;

        data.forEach(item => {
            totalQty += item.Quantity;
            totalValue += item.Quantity * item.Unit_Cost;
        });

        document.getElementById("totalItems").textContent = totalItems;
        document.getElementById("totalQty").textContent = totalQty;
        document.getElementById("totalValue").textContent = "$" + totalValue.toFixed(2);

        const tbody = document.getElementById("inventoryBody");
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" class="text-center p-6 text-gray-400 dark:text-gray-500">📦 No inventory yet</td></tr>`;
            return;
        }

        data.forEach(item => {
            const row = tbody.insertRow();
            row.innerHTML = `
                <td class="p-3 font-medium">${item.Item}</td>
                <td class="p-3">${item.Category}</td>
                <td class="p-3">${item.Quantity}</td>
                <td class="p-3">${item.Units_of_Measurement}</td>
                <td class="p-3">$${item.Unit_Cost}</td>
                <td class="p-3">${item.Supplier}</td>
                <td class="p-3">${item.Purchase_Date}</td>
                <td class="p-3">${item.Expiry_Date}</td>
                <td class="p-3 space-x-2">
                    <button onclick="editItem(${item.id})" class="bg-blue-500 px-3 py-1 rounded text-white hover:scale-105">✏️</button>
                    <button onclick="deleteItem(${item.id})" class="bg-red-500 px-3 py-1 rounded text-white hover:scale-105">🗑</button>
                </td>
            `;
        });

    } catch (err) {
        console.error(err);
    }
}

// DELETE ITEM
function deleteItem(id) {
    if (!confirm("Are you sure you want to delete this item?")) return;

    fetch(`/api/inventory/${id}`, { method: "DELETE" })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            loadInventory();
        });
}

// EDIT ITEM
function editItem(id) {
    const item = inventoryData.find(i => i.id === id);
    document.getElementById('Item').value = item.Item;
    document.getElementById('Category').value = item.Category;
    document.getElementById('Quantity').value = item.Quantity;
    document.getElementById('Units_of_Measurement').value = item.Units_of_Measurement;
    document.getElementById('Unit_Cost').value = item.Unit_Cost;
    document.getElementById('Supplier').value = item.Supplier;
    document.getElementById('Purchase_Date').value = item.Purchase_Date;
    document.getElementById('Expiry_Date').value = item.Expiry_Date;

    const form = document.getElementById('inventoryForm');

    if (!originalSubmit) originalSubmit = form.onsubmit;

    form.onsubmit = async (e) => {
        e.preventDefault();
        const formData = {
            Item: document.getElementById('Item').value,
            Category: document.getElementById('Category').value,
            Quantity: parseInt(document.getElementById('Quantity').value),
            Units_of_Measurement: document.getElementById('Units_of_Measurement').value,
            Unit_Cost: parseFloat(document.getElementById('Unit_Cost').value),
            Supplier: document.getElementById('Supplier').value,
            Purchase_Date: document.getElementById('Purchase_Date').value,
            Expiry_Date: document.getElementById('Expiry_Date').value
        };

        const res = await fetch(`/api/inventory/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData)
        });
        const result = await res.json();
        alert(result.message);
        form.reset();
        form.onsubmit = originalSubmit;
        loadInventory();
    };
}

// ADD ITEM
document.getElementById('inventoryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = {
        Item: document.getElementById('Item').value,
        Category: document.getElementById('Category').value,
        Quantity: parseInt(document.getElementById('Quantity').value),
        Units_of_Measurement: document.getElementById('Units_of_Measurement').value,
        Unit_Cost: parseFloat(document.getElementById('Unit_Cost').value),
        Supplier: document.getElementById('Supplier').value,
        Purchase_Date: document.getElementById('Purchase_Date').value,
        Expiry_Date: document.getElementById('Expiry_Date').value
    };

    const res = await fetch("/api/inventory", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData)
    });

    const result = await res.json();
    alert(result.message);
    document.getElementById('inventoryForm').reset();
    loadInventory();
});

// SEARCH
document.getElementById("searchInput").addEventListener("input", function () {
    const value = this.value.toLowerCase();
    const rows = document.querySelectorAll("#inventoryBody tr");
    rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
    });
});

// INITIAL LOAD
loadInventory();
</script>
</body>
</html>
