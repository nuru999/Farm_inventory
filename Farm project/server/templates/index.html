<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Inventory Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-100 dark:bg-slate-900 flex min-h-screen text-slate-800 dark:text-slate-100">

<!-- SIDEBAR -->
<aside class="w-64 bg-green-700 text-white min-h-screen p-6 space-y-6">
    <h1 class="text-2xl font-bold">🌱 FarmSys</h1>
    <nav class="space-y-3">
        <a href="#" class="block p-2 rounded hover:bg-green-600">📊 Dashboard</a>
        <a href="#" class="block p-2 rounded hover:bg-green-600">📦 Inventory</a>
        <a href="#" class="block p-2 rounded hover:bg-green-600">⚙ Settings</a>
    </nav>
</aside>

<!-- MAIN -->
<main class="flex-1 p-6 space-y-6">

    <!-- TOP BAR -->
    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-semibold">Dashboard</h2>
        <button onclick="toggleDark()" class="bg-slate-200 px-3 py-1 rounded">🌙</button>
    </div>

    <!-- STATS -->
    <div class="grid md:grid-cols-3 gap-4">
        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow">
            <p class="text-sm text-gray-500">Total Items</p>
            <h3 id="totalItems" class="text-2xl font-bold">0</h3>
        </div>
        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow">
            <p class="text-sm text-gray-500">Total Quantity</p>
            <h3 id="totalQty" class="text-2xl font-bold">0</h3>
        </div>
        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow">
            <p class="text-sm text-gray-500">Inventory Value</p>
            <h3 id="totalValue" class="text-2xl font-bold">$0</h3>
        </div>
    </div>

    <!-- CHART -->
    <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow">
        <h2 class="mb-4 font-semibold">Inventory Overview</h2>
        <canvas id="inventoryChart"></canvas>
    </div>

    <!-- FORM -->
    <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow">
        <h2 class="text-xl font-semibold mb-4">Add / Edit Item</h2>

        <form id="inventoryForm" class="grid md:grid-cols-2 gap-4">
            <input type="text" id="Item" placeholder="Item Name" class="p-2 border rounded dark:bg-slate-700">
            <input type="text" id="Category" placeholder="Category" class="p-2 border rounded dark:bg-slate-700">
            <input type="number" id="Quantity" placeholder="Quantity" class="p-2 border rounded dark:bg-slate-700">
            <input type="text" id="Units_of_Measurement" placeholder="Units" class="p-2 border rounded dark:bg-slate-700">
            <input type="number" id="Unit_Cost" placeholder="Unit Cost" class="p-2 border rounded dark:bg-slate-700">
            <input type="text" id="Supplier" placeholder="Supplier" class="p-2 border rounded dark:bg-slate-700">
            <input type="date" id="Purchase_Date" class="p-2 border rounded dark:bg-slate-700">
            <input type="date" id="Expiry_Date" class="p-2 border rounded dark:bg-slate-700">

            <button class="md:col-span-2 bg-green-600 text-white p-3 rounded">
                Add / Update Inventory
            </button>
        </form>
    </div>

    <!-- SEARCH -->
    <input id="searchInput" placeholder="🔍 Search..." class="w-full p-3 border rounded dark:bg-slate-700">

    <!-- TABLE -->
    <div class="overflow-x-auto">
        <table class="w-full bg-white dark:bg-slate-800 rounded-xl shadow">
            <thead class="bg-green-600 text-white">
                <tr>
                    <th class="p-3">Item</th>
                    <th class="p-3">Category</th>
                    <th class="p-3">Qty</th>
                    <th class="p-3">Units</th>
                    <th class="p-3">Cost</th>
                    <th class="p-3">Supplier</th>
                    <th class="p-3">Purchase</th>
                    <th class="p-3">Expiry</th>
                    <th class="p-3">Actions</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>

</main>

<!-- TOAST -->
<div id="toast" class="hidden fixed bottom-5 right-5 px-4 py-2 text-white rounded shadow"></div>

<script>
let inventoryData = [];
let chart;

// DARK MODE
function toggleDark() {
    document.body.classList.toggle("dark");
}

// TOAST
function showToast(msg, type="success") {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = `fixed bottom-5 right-5 px-4 py-2 text-white rounded shadow ${
        type === "success" ? "bg-green-500" : "bg-red-500"
    }`;
    toast.classList.remove("hidden");

    setTimeout(() => toast.classList.add("hidden"), 3000);
}

// CHART
function renderChart(data) {
    const ctx = document.getElementById("inventoryChart");

    const labels = data.map(i => i.Item);
    const values = data.map(i => i.Quantity);

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels,
            datasets: [{
                label: "Stock",
                data: values
            }]
        }
    });
}

// LOAD
async function loadInventory() {
    const res = await fetch("/api/inventory");
    const data = await res.json();
    inventoryData = data;

    let totalQty = 0, totalValue = 0;

    data.forEach(i => {
        totalQty += i.Quantity;
        totalValue += i.Quantity * i.Unit_Cost;
    });

    document.getElementById("totalItems").textContent = data.length;
    document.getElementById("totalQty").textContent = totalQty;
    document.getElementById("totalValue").textContent = "$" + totalValue.toFixed(2);

    renderChart(data);

    const tbody = document.getElementById("inventoryBody");
    tbody.innerHTML = "";

    data.forEach(i => {
        tbody.innerHTML += `
        <tr>
            <td class="p-3">${i.Item}</td>
            <td class="p-3">${i.Category}</td>
            <td class="p-3">${i.Quantity}</td>
            <td class="p-3">${i.Units_of_Measurement}</td>
            <td class="p-3">$${i.Unit_Cost}</td>
            <td class="p-3">${i.Supplier}</td>
            <td class="p-3">${i.Purchase_Date}</td>
            <td class="p-3">${i.Expiry_Date}</td>
            <td class="p-3 space-x-2">
                <button onclick="editItem(${i.id})" class="text-blue-400">✏️</button>
                <button onclick="deleteItem(${i.id})" class="text-red-400">🗑️</button>
            </td>
        </tr>`;
    });
}

// DELETE
async function deleteItem(id) {
    await fetch(`/api/inventory/${id}`, { method: "DELETE" });
    showToast("Item deleted");
    loadInventory();
}

// EDIT
function editItem(id) {
    const i = inventoryData.find(x => x.id === id);

    Object.keys(i).forEach(key => {
        if (document.getElementById(key))
            document.getElementById(key).value = i[key];
    });

    document.getElementById("inventoryForm").onsubmit = async (e) => {
        e.preventDefault();

        await fetch(`/api/inventory/${id}`, {
            method: "PUT",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(getFormData())
        });

        showToast("Updated!");
        resetForm();
        loadInventory();
    };
}

// ADD
document.getElementById("inventoryForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    await fetch("/api/inventory", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(getFormData())
    });

    showToast("Item added!");
    resetForm();
    loadInventory();
});

// GET FORM
function getFormData() {
    return {
        Item: Item.value,
        Category: Category.value,
        Quantity: parseInt(Quantity.value),
        Units_of_Measurement: Units_of_Measurement.value,
        Unit_Cost: parseFloat(Unit_Cost.value),
        Supplier: Supplier.value,
        Purchase_Date: Purchase_Date.value,
        Expiry_Date: Expiry_Date.value
    };
}

// RESET
function resetForm() {
    document.getElementById("inventoryForm").reset();
}

// SEARCH
searchInput.addEventListener("input", function () {
    const v = this.value.toLowerCase();
    document.querySelectorAll("#inventoryBody tr").forEach(r => {
        r.style.display = r.innerText.toLowerCase().includes(v) ? "" : "none";
    });
});

// INIT
loadInventory();
</script>

</body>
</html>
